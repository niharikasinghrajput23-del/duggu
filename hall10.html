<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forever ❤️</title>

<link rel="stylesheet" href="style.css">

<style>
body{
background:linear-gradient(to bottom,#000,#090909,#111);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
text-align:center;
}

.container{
animation:fade 2s;
}

h1{
font-size:60px;
color:gold;
}

p{
font-size:22px;
margin-top:20px;
}

.heart{
font-size:80px;
animation:beat 1s infinite;
}

@keyframes beat{
50%{transform:scale(1.2);}
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}
</style>

</head>

<body>

<div class="container">

<div class="heart">❤️</div>

<h1>Thank You, Duggu</h1>

<p>

The museum ends here...

<br><br>

But our love story is just beginning.

<br><br>

I Love You Forever ❤️

</p>

</div>

</body>

</html>
